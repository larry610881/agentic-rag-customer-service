name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'apps/widget/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: agentic-rag
  REGION: asia-east1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/widget/package-lock.json

      - name: Build Widget
        run: |
          cd apps/widget
          npm ci
          npm run build

      - name: Google Auth (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Authorize Docker push
        run: gcloud auth configure-docker asia-east1-docker.pkg.dev

      - name: Create Artifact Registry Repository (if not exists)
        run: |
          gcloud artifacts repositories create cloud-run-source-deploy \
            --repository-format=docker \
            --location=asia-east1 \
            --description="Docker images for Cloud Run" || echo "Repository already exists"

      - name: Build and Push Container
        run: |
          cd apps/backend
          docker build -t asia-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push asia-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: asia-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            DATABASE_URL_OVERRIDE=${{ secrets.DATABASE_URL_OVERRIDE }}
            REDIS_URL_OVERRIDE=${{ secrets.REDIS_URL_OVERRIDE }}
            MILVUS_URI=${{ secrets.MILVUS_URI }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            ENCRYPTION_MASTER_KEY=${{ secrets.ENCRYPTION_MASTER_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            STORAGE_BACKEND=${{ vars.STORAGE_BACKEND || 'gcs' }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
            RATE_LIMIT_ENABLED=${{ vars.RATE_LIMIT_ENABLED || 'true' }}
            OLLAMA_BASE_URL=${{ vars.OLLAMA_BASE_URL }}
            APP_ENV=production
            LOG_LEVEL=INFO
          flags: |
            --allow-unauthenticated
            --port=8000
            --memory=2Gi
            --cpu=1
            --cpu-boost
            --no-cpu-throttling
            --min-instances=1
            --max-instances=5
            --vpc-connector=db-connector
            --vpc-egress=private-ranges-only

  # ---------------------------------------------------------------------------
  # arq Worker (跑在 GCE VM `db-services` via systemd) — 跟 Cloud Run 不同部署路徑
  # ---------------------------------------------------------------------------
  # 為何 worker 不上 Cloud Run：worker 為 long-lived process（無 HTTP），且需與
  # PostgreSQL / Redis / Milvus 共用 VM 內網。CI/CD 透過 IAP SSH 進 VM `git pull`
  # + `uv sync` + `systemctl restart arq-worker.service`，與 main 程式碼同步。
  #
  # 不加這 job 之前的後果：worker 永遠跑著上次手動部署時的 code，新功能上線後
  # 「Cloud Run 有但 worker 跑不到」（例：S-LLM-Cache.1 的 cache 計費 / Token-Gov 的
  # auto-classification record_usage 全部 silently 失效 6 天）。
  deploy-worker:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Google Auth (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Pull latest code + sync deps + restart arq-worker on VM
        run: |
          set -euo pipefail
          # SA 用 ephemeral Linux user 登入 VM，沒有 /home/p10359945 的讀權限，
          # 所以 git / uv 檔案操作用 `sudo -u p10359945` 切身分；systemctl
          # restart 本來就要 sudo。NOPASSWD 靠 gcloud SSH 預設 sudoers 規則。
          gcloud compute ssh db-services \
            --zone=asia-east1-b \
            --tunnel-through-iap \
            --project=${{ env.PROJECT_ID }} \
            --quiet \
            --command='
              set -euo pipefail
              echo "==> git pull (as p10359945)"
              sudo -u p10359945 bash -lc "
                cd /home/p10359945/agentic-rag-customer-service
                git fetch --quiet origin main
                git reset --hard origin/main
                echo HEAD: \$(git rev-parse --short HEAD)
                cd apps/backend
                /home/p10359945/.local/bin/uv sync --quiet
              "
              echo "==> restart arq-worker.service"
              sudo systemctl restart arq-worker.service
              sleep 3
              sudo systemctl is-active arq-worker.service
              echo "==> recent log:"
              sudo journalctl -u arq-worker.service --since "10 seconds ago" --no-pager | tail -5
            '

      - name: Verify worker picked up new revision
        run: |
          set -euo pipefail
          REMOTE_SHA=$(gcloud compute ssh db-services \
            --zone=asia-east1-b \
            --tunnel-through-iap \
            --project=${{ env.PROJECT_ID }} \
            --quiet \
            --command='sudo -u p10359945 git -C /home/p10359945/agentic-rag-customer-service rev-parse HEAD')
          echo "Local CI SHA:  ${{ github.sha }}"
          echo "Worker VM SHA: ${REMOTE_SHA}"
          if [ "${{ github.sha }}" != "${REMOTE_SHA}" ]; then
            echo "::error::Worker VM SHA mismatch — pull failed silently"
            exit 1
          fi
