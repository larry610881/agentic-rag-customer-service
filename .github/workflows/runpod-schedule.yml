name: RunPod Pod 排程開關

on:
  # 台灣時間 08:30 開機 (UTC 00:30)
  schedule:
    - cron: "30 0 * * 1-5"   # 週一到週五早上開機
    - cron: "0 11 * * 1-5"   # 週一到週五傍晚 19:00 關機 (UTC 11:00)

  # 手動觸發
  workflow_dispatch:
    inputs:
      action:
        description: "start or stop"
        required: true
        default: "start"
        type: choice
        options: [start, stop, status]

env:
  RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
  RUNPOD_POD_ID: ${{ secrets.RUNPOD_POD_ID }}

jobs:
  control-pod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 判斷動作
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "cmd=${{ inputs.action }}" >> $GITHUB_OUTPUT
          else
            # cron: 00:30 UTC = 開機, 11:00 UTC = 關機
            MINUTE=$(date -u +%M)
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "00" ]; then
              echo "cmd=start" >> $GITHUB_OUTPUT
            else
              echo "cmd=stop" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 執行 ${{ steps.action.outputs.cmd }}
        run: python scripts/runpod_ctl.py ${{ steps.action.outputs.cmd }}
